name: Weekly status report

on:
  schedule:
    - cron: '0 9 * * MON'
  workflow_dispatch:

jobs:
  create-status-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create weekly status issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly status report — ${today}`,
              labels: ['status-report'],
              body: `## Migration status — ${today}\n\n### Overall health\n- [ ] On track\n- [ ] At risk\n- [ ] Off track\n\n### This week\n-\n\n### Next week\n-\n\n### Blockers\n-\n\n### Risks\n-\n\n### Actions needed from stakeholders\n-`
            });
